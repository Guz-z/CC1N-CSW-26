<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <tr>
            <td><label for="nome">Nome:</label></td>
            <td><input type="text" name="nome" id="nome" size="20" maxlength="30" value=""
                placeholder="digite seu nome" required></td>
        </tr>
        <tr>
            <td><label for="email">E-mail pessoal:</label></td>
            <td><input type="email" id="email" name="email"></td>
        </tr>
        <tr>
            <td><label for="email patter">E-mail (patter):</label></td>
            <td><input type="email" id="email" name="email"></td>
        </tr>
        <tr>
            <td><label for="senha">Senha:</label></td>
            <td><input type="password" id="senha" name="senha"></td>
        </tr>
        <tr>
            <td><label for="idade">Idade:</label></td>
            <td><input type="text" name="idade" id="idade" size="5" maxlength="10" value="" required></td>
        </tr>
        <tr>
            <td colspan="2"><label for="deixe um comentario">Deixe um comentario:</label><br><textarea name="comentario" cols="50" rows="10" ></textarea></td>
        </tr>
        <tr>
            <td>
                <label for="materia">Matéria de interesse:</label><br>
                <input type="checkbox" name="backend" value="backend">Backend <br>
                <input type="checkbox" name="frontend" value="frontend"> frontend <br>
                <input type="checkbox" name="fullstack" value="fullstack"> fullstack
            </td>
             <td>
                <label for="materia">Matéria de interesse:</label><br>
                <input type="radio" name="negocios" value="negocios">Negócios<br>
                <input type="radio" name="lazer" value="lazer"> Lazer <br>
                <input type="radio" name="turismo" value="turismo"> Turismo <br>
                <input type="radio" name="academico" value="academico"> Acadêmico
            </td>
        </tr>
        <tr>
            <td>
                <label for="">Esporte favorito:</label>
            </td>
        </tr>
    </table>
</body>
</html>
